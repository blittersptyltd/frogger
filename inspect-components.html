<!doctype html>
<meta charset="utf-8">
<pre id="out">loading</pre>
<script>
const img = new Image();
img.src = "public/images/11067.png";
img.onload = () => {
  const canvas = document.createElement("canvas");
  canvas.width = img.width;
  canvas.height = img.height;
  const ctx = canvas.getContext("2d");
  ctx.drawImage(img, 0, 0);
  const { data, width } = ctx.getImageData(0, 140, img.width, 40);
  const h = 40;
  const seen = new Uint8Array(img.width * h);
  const components = [];
  const isPixel = (x, y) => {
    const i = (y * width + x) * 4;
    return data[i + 3] > 0 && !(data[i] < 4 && data[i + 1] < 4 && data[i + 2] < 4);
  };
  for (let y = 0; y < h; y += 1) {
    for (let x = 0; x < img.width; x += 1) {
      const start = y * img.width + x;
      if (seen[start] || !isPixel(x, y)) continue;
      const stack = [[x, y]];
      seen[start] = 1;
      let minX = x, maxX = x, minY = y, maxY = y, count = 0;
      while (stack.length) {
        const [px, py] = stack.pop();
        count += 1;
        minX = Math.min(minX, px); maxX = Math.max(maxX, px);
        minY = Math.min(minY, py); maxY = Math.max(maxY, py);
        for (const [nx, ny] of [[px + 1, py], [px - 1, py], [px, py + 1], [px, py - 1]]) {
          if (nx < 0 || nx >= img.width || ny < 0 || ny >= h) continue;
          const index = ny * img.width + nx;
          if (seen[index] || !isPixel(nx, ny)) continue;
          seen[index] = 1;
          stack.push([nx, ny]);
        }
      }
      if (count > 4) components.push({ x: minX, y: minY + 140, w: maxX - minX + 1, h: maxY - minY + 1, count });
    }
  }
  out.textContent = JSON.stringify(components, null, 2);
};
</script>
